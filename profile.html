<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="groww-logo-270.png" />
  <link rel="icon" type="image/png" href="groww-logo-270.png" />
  <title>Groww Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <main class="profile-shell">
    <header class="profile-topbar">
      <a class="back-button" href="index.html" aria-label="Back">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 19-7-7 7-7"></path></svg>
      </a>

      <div class="top-actions">
        <button class="top-icon notify" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
          </svg>
          <span></span>
        </button>
        <button class="top-icon" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.56V21a2 2 0 0 1-4 0v-.08a1.7 1.7 0 0 0-1-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1H3a2 2 0 0 1 0-4h.08a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10 3.04V3a2 2 0 0 1 4 0v.08a1.7 1.7 0 0 0 1 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.4.97 1.02 1 1.6 1h.04a2 2 0 0 1 0 4H21c-.58 0-1.2.03-1.6 1Z"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="identity">
      <div class="avatar-orbit" aria-hidden="true">
        <svg class="orbit-text" viewBox="0 0 180 180">
          <defs>
            <path id="orbitTextPath" d="M90 90 m-70 0 a70 70 0 1 1 140 0 a70 70 0 1 1 -140 0"></path>
          </defs>
          <text>
            <textPath href="#orbitTextPath" startOffset="1%">
              GROWING SINCE JUN'22 • GROWING SINCE JUN'22 •
            </textPath>
          </text>
        </svg>
        <div class="avatar-core">d</div>
      </div>
      <h1>Disney Ketan Sharma</h1>
    </section>

    <section class="profile-menu" aria-label="Profile menu">
      <a class="profile-row balance-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h14a2 2 0 0 1 2 2v8H4z"></path><path d="M4 8 15 3v5"></path></svg>
        </span>
        <span class="row-copy">
          <strong class="balance">&#8377;4,93,730.70</strong>
          <small>Stocks, F&amp;O balance</small>
        </span>
        <span class="action-pill">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
          Add money
        </span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"></path><path d="M9 3h10a2 2 0 0 1 2 2v10"></path><path d="m12 8-2 4h4l-2 4"></path></svg>
        </span>
        <span class="row-copy">
          <strong>Instant trade balance</strong>
        </span>
        <span class="action-pill">Pledge</span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"></path><path d="M9 8h6"></path><path d="M9 12h4"></path></svg>
        </span>
        <span class="row-copy"><strong>Orders</strong></span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l3 3v15H6z"></path><path d="M15 3v4h4"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></svg>
        </span>
        <span class="row-copy"><strong>Reports</strong></span>
        <span class="action-pill tax-pill">File tax <b>&rsaquo;</b></span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 5 8 7-8 7z"></path><path d="m12 5 8 7-8 7z"></path></svg>
        </span>
        <span class="row-copy"><strong>UPI</strong></span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="7" r="4"></circle><path d="M4 21a8 8 0 0 1 16 0"></path></svg>
        </span>
        <span class="row-copy"><strong>Account details</strong></span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10h18"></path><path d="m5 10 7-5 7 5"></path><path d="M5 10v8"></path><path d="M9 10v8"></path><path d="M15 10v8"></path><path d="M19 10v8"></path><path d="M4 18h16"></path></svg>
        </span>
        <span class="row-copy"><strong>Bank &amp; AutoPay</strong></span>
      </a>

      <a class="profile-row" href="#">
        <span class="row-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 5.6a5.5 5.5 0 0 0-7.8 0L12 6.6l-1-1a5.5 5.5 0 0 0-7.8 7.8L12 22l8.8-8.6a5.5 5.5 0 0 0 0-7.8Z"></path></svg>
        </span>
        <span class="row-copy"><strong>Refer &amp; Invite</strong></span>
      </a>
    </section>
  </main>
</body>
</html>
